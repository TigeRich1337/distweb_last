<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DisTechSol — Enterprise Security & IT Integration · Azerbaijan & UAE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="src/styles.css" />
<style>
/* ── Preloader ─────────────────────────────────────────────── */
#preloader {
  position: fixed; inset: 0; z-index: 9999;
  background: #0b1422;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 36px;
  transition: opacity 600ms cubic-bezier(0.4,0,0.2,1);
}
#preloader-logo {
  height: 44px; width: auto;
  filter: brightness(0) invert(1);
  opacity: 0.9;
  animation: pl-fadein 500ms ease both;
}
@keyframes pl-fadein {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 0.9; transform: none; }
}
#preloader-bar-wrap {
  width: min(280px, 72vw);
  height: 1.5px;
  background: rgba(255,255,255,0.10);
  border-radius: 999px;
  overflow: hidden;
  animation: pl-fadein 500ms 100ms ease both;
}
#preloader-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #1748ff 0%, #00b894 100%);
  border-radius: 999px;
}
#preloader-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 400;
  color: rgba(255,255,255,0.30);
  letter-spacing: 0.14em;
  animation: pl-fadein 500ms 200ms ease both;
}
</style>
</head>
<body>

<!-- Preloader (shown before React mounts) -->
<div id="preloader" aria-hidden="true">
  <img id="preloader-logo" src="assets/brand/distechsol-logo.png" alt="" />
  <div id="preloader-bar-wrap">
    <div id="preloader-fill"></div>
  </div>
  <div id="preloader-num">0%</div>
</div>

<a class="skip-link" href="#main">Skip to content</a>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Preloader script (plain JS, runs immediately) -->
<script src="src/preloader.js"></script>

<!-- App scripts (order matters: data → i18n → ui → sections → pages → app) -->
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/i18n.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/header-footer.jsx"></script>
<script type="text/babel" src="src/page-home.jsx"></script>
<script type="text/babel" src="src/page-solutions.jsx"></script>
<script type="text/babel" src="src/page-products.jsx"></script>
<script type="text/babel" src="src/page-service.jsx"></script>
<script type="text/babel" src="src/page-vendors.jsx"></script>
<script type="text/babel" src="src/page-projects.jsx"></script>
<script type="text/babel" src="src/page-about.jsx"></script>
<script type="text/babel" src="src/page-contact.jsx"></script>
<script type="text/babel" src="src/tweaks-panel.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
